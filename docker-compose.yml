services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: critcom-hapi
    ports:
      # Host 8081 (8080 reserved by an existing service on the deploy VM).
      # Container port stays 8080 — internal docker network refs are unchanged.
      - "8081:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_external_references: "true"
    volumes:
      - hapi-data:/data/hapi
    # NOTE: hapiproject/hapi is distroless — no shell, no curl/wget. We can't
    # exec a healthcheck inside the container. The agent uses tenacity retries
    # against FHIR, so depends_on: condition: service_started is sufficient.

  orthanc:
    image: orthancteam/orthanc:latest
    container_name: critcom-orthanc
    ports:
      - "8042:8042"   # REST + UI
      - "4242:4242"   # DICOM
    environment:
      ORTHANC__NAME: "CritCom Orthanc"
      ORTHANC__REGISTERED_USERS: |
        {"orthanc": "orthanc"}
      ORTHANC__DICOM_AET: "ORTHANC"
      ORTHANC__WORKLISTS__ENABLE: "true"
      ORTHANC__WORKLISTS__DATABASE: "/var/lib/orthanc/worklists"
      ORTHANC__WORKLISTS__FILTER_ISSUER_AET: "false"
      # Allow the CritCom agent (and any client) to C-FIND against the worklist
      # without pre-registering each AET. Worklist queries are read-only and
      # this stays inside the docker network.
      ORTHANC__DICOM_ALWAYS_ALLOW_FIND: "true"
      ORTHANC__DICOM_ALWAYS_ALLOW_FIND_WORKLIST: "true"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./orthanc-worklists:/var/lib/orthanc/worklists

  # One-shot loader: posts the FHIR transaction bundle to HAPI on every `up`.
  # HAPI's `ifNoneExist` semantics make this idempotent — re-runs are safe.
  # Exits cleanly when done so `docker compose up` doesn't block.
  seed-fhir:
    image: curlimages/curl:latest
    container_name: critcom-seed-fhir
    depends_on:
      hapi-fhir:
        condition: service_started
    volumes:
      - ./tests/fixtures/fhir/seed_bundle.json:/seed/seed_bundle.json:ro
    entrypoint:
      - sh
      - -c
      - |
        echo "[seed-fhir] waiting for HAPI to be reachable..."
        until curl -sfm 3 http://hapi-fhir:8080/fhir/metadata >/dev/null 2>&1; do
          sleep 3
        done
        echo "[seed-fhir] HAPI is up. Posting transaction bundle..."
        curl -sS -X POST http://hapi-fhir:8080/fhir \
          -H "Content-Type: application/fhir+json" \
          --data @/seed/seed_bundle.json \
          -o /dev/null -w "[seed-fhir] HTTP %{http_code}\n"

  critcom-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: critcom-agent:local
    container_name: critcom-agent
    ports:
      # Host 8002 (8001 reserved by an existing service on the deploy VM).
      - "8002:8001"
    env_file: .env
    environment:
      AGENT_MODULE: critcom_agent.app:a2a_app
      PORT: 8001
      # Service-name DNS only — never use `localhost` here. The agent runs in
      # its own container, so `localhost` would point at itself, not HAPI.
      CRITCOM_FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      CRITCOM_DICOM_HOST: orthanc
      CRITCOM_DICOM_PORT: 4242
      CRITCOM_ORTHANC_URL: http://orthanc:8042
    depends_on:
      hapi-fhir:
        condition: service_started
      orthanc:
        condition: service_started
      seed-fhir:
        condition: service_completed_successfully

  # Eval harness as a docker service — runs the 5-metric performance suite
  # against the in-network agent. Override CRITCOM_EVAL_BASE_URL to target
  # the live VM instead. Started via `--profile eval` so it doesn't run on
  # every `up` (it makes LLM calls and burns quota).
  critcom-eval:
    build:
      context: .
      dockerfile: eval/Dockerfile
    image: critcom-eval:local
    container_name: critcom-eval
    profiles: ["eval"]
    depends_on:
      critcom-agent:
        condition: service_started
    environment:
      CRITCOM_EVAL_BASE_URL: http://critcom-agent:8001
      # Lets scorer 3 read Communication/Task straight off HAPI (authoritative)
      # instead of parsing the agent's narrative. Service-name DNS, not localhost.
      CRITCOM_EVAL_FHIR_BASE_URL: http://hapi-fhir:8080/fhir
    volumes:
      - ./eval/reports:/app/eval/reports

volumes:
  hapi-data:
  orthanc-data:
